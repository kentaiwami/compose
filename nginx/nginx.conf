server {
    listen 80;
    server_name sensor-api.kentaiwami.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    server_name sensor-api.kentaiwami.com;
    ssl_certificate /etc/letsencrypt/live/sensor-api.kentaiwami.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sensor-api.kentaiwami.com/privkey.pem;
    location / { proxy_pass http://sensor-api:8080; proxy_set_header Host $host; }
}

